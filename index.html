    class JerryModEngine {
        constructor() {
            this.app = initializeApp(SYSTEM_CONFIG.firebase);
            this.db = getDatabase(this.app);
            this.verifiedKeyId = null;
            this.verifiedKeyData = null;
            this.processedBytes = null;
            this.originalFileName = "";
            this.currentSelectedConfig = "avatar";
            this.currentSelectedValue = "";
            
            this.initElements();
            this.bindEvents();
            this.initSnowAnimation();
        }

        initElements() {
            this.el = {
                keyInput: document.getElementById('inputActivationKey'),
                btnVerify: document.getElementById('btnVerifyKey'),
                loginPanel: document.getElementById('loginPanel'),
                mainMenuPanel: document.getElementById('mainMenuPanel'),
                btnSelectAvatar: document.getElementById('btnSelectAvatar'),

                selectWrapper: document.getElementById('customSelectWrapper'),
                optionsContainer: document.getElementById('customOptionsContainer'),
                selectedImg: document.getElementById('selectedImg'),
                selectedText: document.getElementById('selectedText'),
                fileInput: document.getElementById('fileInput'),
                fileMsg: document.getElementById('fileMsg'),
                dropArea: document.getElementById('dropArea'),
                btnProcess: document.getElementById('btnProcess'),
                btnDownload: document.getElementById('btnDownload'),
                downloadLink: document.getElementById('downloadLink'),
                status: document.getElementById('status'),
                canvas: document.getElementById('snowCanvas')
            };
        }

        bindEvents() {
            this.el.btnVerify.addEventListener('click', () => this.verifyActivationKey());
            this.el.btnSelectAvatar.addEventListener('click', () => this.switchConfigSection('avatar'));
            this.el.btnSelectCache.addEventListener('click', () => this.switchConfigSection('cache'));
            this.el.selectWrapper.querySelector('.custom-select-trigger').addEventListener('click', () => this.toggleDropdown());
            this.el.fileInput.addEventListener('change', () => this.handleFileSelection());
            this.el.btnProcess.addEventListener('click', () => this.processHexFileStructure());
            this.el.btnDownload.addEventListener('click', () => this.executeBlobDownload());

            ['dragenter', 'dragover'].forEach(e => this.el.dropArea.addEventListener(e, () => this.el.dropArea.classList.add('dragover'), false));
            ['dragleave', 'drop'].forEach(e => this.el.dropArea.addEventListener(e, () => this.el.dropArea.classList.remove('dragover'), false));

            this.renderDynamicDropdown();

            // Chạy kiểm tra đăng nhập tự động sau cùng để tránh lỗi bất đồng bộ Dropdown UI
            window.addEventListener('DOMContentLoaded', () => {
                const savedKey = localStorage.getItem('jerry_mod_saved_key');
                if (savedKey) {
                    this.el.keyInput.value = savedKey;
                    this.verifyActivationKey();
                }
            });
        }

        getDeviceFingerprint() {
            let uuid = localStorage.getItem('jerry_mod_hwid');
            if (!uuid) {
                uuid = 'DEV-' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                localStorage.setItem('jerry_mod_hwid', uuid);
            }
            return uuid;

            this.el.btnSelectCache.classList.toggle('active', configType === 'cache');
            this.renderDynamicDropdown();
        }

        renderDynamicDropdown() {
            this.el.optionsContainer.innerHTML = "";
            const options = SYSTEM_CONFIG.functionOptions[this.currentSelectedConfig] || [];
            options.forEach((opt, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = "custom-option";
                optionDiv.setAttribute('data-value', opt.value);
                optionDiv.innerHTML = `<div class="option-content"><img src="${opt.img}" class="func-img" alt=""><span class="option-text">${opt.text}</span></div><div class="checkmark">✓</div>`;
                optionDiv.onclick = () => {
                    this.setOptionState(opt.value, opt.text, opt.img);
                    this.toggleDropdown();
                };
                this.el.optionsContainer.appendChild(optionDiv);
                if (index === 0) this.setOptionState(opt.value, opt.text, opt.img);
            });
        }

        setOptionState(value, text, imgUrl) {
            this.currentSelectedValue = value;
            this.el.selectedImg.src = imgUrl;
            this.el.selectedText.innerText = text;
            this.el.optionsContainer.querySelectorAll('.custom-option').forEach(opt => {
                opt.classList.toggle('selected', opt.getAttribute('data-value') === value);
            });
        }

        handleFileSelection() {
            if (this.el.fileInput.files.length > 0) {
                let size = (this.el.fileInput.files[0].size / 1024).toFixed(1);
                this.el.fileMsg.innerText = `📁 ${this.el.fileInput.files[0].name} (${size} KB)`;
            } else {
                this.el.fileMsg.innerText = "CHỌN FILE GỐC ĐỂ MAKE FILE.";
            }
        }

        // --- CRYPTO UTILS ---
        stringToHex(str) {
            let hex = "";
            for (let i = 0; i < str.length; i++) { hex += str.charCodeAt(i).toString(16).padStart(2, '0'); }
            return hex;
        }

        hexToBytes(hex) {
            hex = hex.replace(/\s+/g, '');
            let bytes = new Uint8Array(hex.length / 2);
            for (let i = 0; i < hex.length; i += 2) { bytes[i / 2] = parseInt(hex.substr(i, 2), 16); }
            return bytes;
        }

        replaceByteArray(buffer, targetBytes, replaceBytes) {
            let view = new Uint8Array(buffer);
            let count = 0;
            for (let i = 0; i <= view.length - targetBytes.length; i++) {
                let match = true;
                for (let j = 0; j < targetBytes.length; j++) {
                    if (view[i + j] !== targetBytes[j]) { match = false; break; }
                }
                if (match) {
                    view.set(replaceBytes, i);
                    count++;
                    i += targetBytes.length - 1;
                }
            }
            return { updatedBuffer: view, matchCount: count };
        }

        clearBoneData(buffer) {
            let currentBuffer = buffer;
            let boneClearCount = 0;
            const uniqueBones = [...new Set(SYSTEM_CONFIG.bones)];
            for (let bone of uniqueBones) {
                let targetHex = this.stringToHex(bone);
                let targetBytes = this.hexToBytes(targetHex);
                let replaceBytes = new Uint8Array(targetBytes.length);
                let result = this.replaceByteArray(currentBuffer, targetBytes, replaceBytes);
                currentBuffer = result.updatedBuffer.buffer;
                boneClearCount += result.matchCount;
            }
            return { updatedBuffer: new Uint8Array(currentBuffer), boneCount: boneClearCount };
        }

        // --- AUTHENTICATION ENGINE ---
        async verifyActivationKey() {
            const keyInput = this.el.keyInput.value.trim();
            if (!keyInput) {
                this.showStatus("[Jerry Mod] Hãy nhập mã Key VIP của bạn!", "error");
                return;
            }

            const myDeviceHwid = this.getDeviceFingerprint();
            this.showStatus("[INFO] Đang liên kết kiểm tra mã Key và bảo mật thiết bị...", "success");

            try {
                const snap = await get(ref(this.db, 'boost_keys'));
                if (!snap.exists()) {
                    this.showStatus("[ERROR] Cơ sở dữ liệu trống hoặc không khả dụng!", "error");
                    return;
                }

                let foundId = null, foundData = null;
                Object.entries(snap.val()).forEach(([id, data]) => {
                    if (data.keyStr === keyInput) { foundId = id; foundData = data; }
                });

                if (!foundId) {
                    this.showStatus("[Jerry Mod] Mã Key nhập vào sai hoặc đã bị Admin xoá!", "error");
                    localStorage.removeItem('jerry_mod_saved_key');
                    return;
                }

                if (foundData.locked) return this.showStatus("[Jerry Mod] Key này đã bị Admin khóa quyền truy cập!", "error");
                if (foundData.expiry > 0 && Date.now() > foundData.expiry) return this.showStatus("[Jerry Mod] Key VIP của bạn đã hết hạn sử dụng!", "error");
                if (foundData.maxAccess > 0 && (foundData.accessCount || 0) >= foundData.maxAccess) return this.showStatus("[Jerry Mod] Key này đã sử dụng hết lượt quy định!", "error");
                if (foundData.deviceFingerprint && foundData.deviceFingerprint !== myDeviceHwid) return this.showStatus("[Jerry Mod] Key đã bị khóa trên thiết bị khác! Liên hệ Admin để reset.", "error");

                if (!foundData.deviceFingerprint) {
                    let bindDeviceUpdate = {};
                    bindDeviceUpdate[`boost_keys/${foundId}/deviceFingerprint`] = myDeviceHwid;
                    await update(ref(this.db), bindDeviceUpdate);
                    foundData.deviceFingerprint = myDeviceHwid;
                }

                localStorage.setItem('jerry_mod_saved_key', keyInput);
                this.el.keyInput.value = '';
                this.verifiedKeyId = foundId;
                this.verifiedKeyData = foundData;

                this.el.loginPanel.style.display = 'none';
                this.el.mainMenuPanel.style.display = 'block';
                this.showStatus(`[JerryMod] Thiết bị đã đồng bộ! Đăng nhập thành công Menu VIP.`, "success");
            } catch (err) {
                this.showStatus("[FATAL] Lỗi mạng hoặc Firebase bị từ chối: " + err.message, "error");
            }
        }

        // --- FILE INJECTION PROCESSOR ---
        async processHexFileStructure() {
            const makeFunction = this.currentSelectedValue;
            const myDeviceHwid = this.getDeviceFingerprint();

            if (!this.verifiedKeyId) return this.showStatus("[Jerry Mod] Trạng thái Key không hợp lệ. Vui lòng tải lại trang!", "error");
            if (!this.el.fileInput.files || this.el.fileInput.files.length === 0) return this.showStatus("[Jerry Mod] Bạn chưa chọn file gốc để thực hiện build!", "error");

            try {
                const checkSnap = await get(ref(this.db, `boost_keys/${this.verifiedKeyId}`));
                const liveData = checkSnap.val();
                
                if (!liveData || liveData.locked || (liveData.expiry > 0 && Date.now() > liveData.expiry)) return this.showStatus("[Jerry Mod] Key đã bị Admin thay đổi trạng thái đột ngột!", "error");
                if (liveData.deviceFingerprint !== myDeviceHwid) return this.showStatus("[Jerry Mod] Phát hiện xung đột! Thiết bị không hợp lệ để thực thi.", "error");
                if (liveData.maxAccess > 0 && (liveData.accessCount || 0) >= liveData.maxAccess) return this.showStatus("[Jerry Mod] Key đã vừa hết lượt dùng!", "error");

                const file = this.el.fileInput.files[0];
                this.originalFileName = file.name;
                const reader = new FileReader();

                this.showStatus("[INFO] Đang chạy lệnh giải mã nhị phân Inject Script...", "success");

                reader.onload = async (e) => {
                    let arrayBuffer = e.target.result;
                    let totalMatches = 0;
                    const currentConfig = SYSTEM_CONFIG.hexData[makeFunction];

                    if (Array.isArray(currentConfig)) {
                        let currentBuffer = arrayBuffer;
                        for (let step of currentConfig) {
                            let targetBytes = this.hexToBytes(step.target);
                            let replaceBytes = this.hexToBytes(step.replace);
                            let result = this.replaceByteArray(currentBuffer, targetBytes, replaceBytes);
                            currentBuffer = result.updatedBuffer.buffer;
                            totalMatches += result.matchCount;
                        }
                        this.processedBytes = new Uint8Array(currentBuffer);
                    } else {
                        let targetBytes = this.hexToBytes(currentConfig.target);
                        let replaceBytes = this.hexToBytes(currentConfig.replace);
                        let result = this.replaceByteArray(arrayBuffer, targetBytes, replaceBytes);
                        totalMatches = result.matchCount;
                        this.processedBytes = result.updatedBuffer;
                    }

                    let totalBonesReplaced = 0;
                    if (makeFunction === "aim_body") {
                        let boneResult = this.clearBoneData(this.processedBytes.buffer);
                        this.processedBytes = boneResult.updatedBuffer;
                        totalBonesReplaced = boneResult.boneCount;
                    }

                    if (totalMatches > 0) {
                        let newCount = (liveData.accessCount || 0) + 1;
                        let upd = {};
                        upd[`boost_keys/${this.verifiedKeyId}/accessCount`] = newCount;
                        await update(ref(this.db), upd);

                        let accessStatusText = liveData.maxAccess > 0 ? ` (Lượt dùng: ${newCount}/${liveData.maxAccess})` : " (Hạn dùng: Vĩnh viễn)";
                        this.showStatus(`ĐÃ MAKE THÀNH CÔNG! ĐÃ TIÊM ANTIBAN VÀO FILE ${totalBonesReplaced > 0 ? `(Đã dọn thêm ${totalBonesReplaced} Bone)` : ''}${accessStatusText}`, "success");
                        this.el.btnDownload.style.display = "block";
                    } else {
                        this.processedBytes = null;
                        this.el.btnDownload.style.display = "none";
                        if (makeFunction === "aim_body") {
                            let testBoneResult = this.clearBoneData(arrayBuffer);
                            if (testBoneResult.boneCount > 0) return this.showStatus("[CONFLICT] File chứa cấu trúc bone hợp lệ nhưng sai phân vùng tính năng!", "error");
                        }
                        this.showStatus("BỊ NGƠ À, CHỌN CẤU HÌNH ĐÚNG VỚI FILE ĐỂ MAKE.", "error");
                    }
                };
                reader.readAsArrayBuffer(file);
            } catch (err) {
                this.showStatus("[FATAL] Lỗi đồng bộ dữ liệu: " + err.message, "error");
            }
        }

        executeBlobDownload() {
            if (!this.processedBytes) return;
            const blob = new Blob([this.processedBytes], { type: "application/octet-stream" });
            this.el.downloadLink.href = URL.createObjectURL(blob);
            this.el.downloadLink.download = "mod_" + this.originalFileName;
            this.el.downloadLink.click();
        }

        // --- VISUAL EFFECT SYSTEM ---
        initSnowAnimation() {
            if (!this.el.canvas) return;
            const ctx = this.el.canvas.getContext('2d');
            let flakes = [];
            const resize = () => { this.el.canvas.width = window.innerWidth; this.el.canvas.height = window.innerHeight; };
            window.addEventListener('resize', resize);
            resize();
            
            for (let i = 0; i < 50; i++) {
                flakes.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, r: Math.random() * 2 + 0.8, d: Math.random() * 50, speed: Math.random() * 0.8 + 0.3 });
            }
            
            const animate = () => {
                ctx.clearRect(0, 0, this.el.canvas.width, this.el.canvas.height);
                ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                ctx.beginPath();
                for (let f of flakes) {
                    ctx.moveTo(f.x, f.y);
                    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
                    f.y += f.speed; f.x += Math.sin(f.d / 10) * 0.3;
                    if (f.y > this.el.canvas.height) { f.y = 0; f.x = Math.random() * this.el.canvas.width; }
                }
                ctx.fill();
                requestAnimationFrame(animate);
            };
            animate();
        }
    }

    // Khởi tạo hệ thống
    const JerryMod = new JerryModEngine();
</script>
